kind = "web"
previewPath = "/"
title = "Karyaa Website"
version = "1.0.0"
id = "artifacts/karyaa-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21325

[services.development]
run = "pnpm --filter @workspace/karyaa-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/karyaa-website", "run", "build" ]
publicDir = "artifacts/karyaa-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/services"
to = "/services.html"

[[services.production.rewrites]]
from = "/about"
to = "/about.html"

[[services.production.rewrites]]
from = "/contact"
to = "/contact.html"

[[services.production.rewrites]]
from = "/data-entry-support"
to = "/data-entry-support.html"

[[services.production.rewrites]]
from = "/research-support"
to = "/research-support.html"

[[services.production.rewrites]]
from = "/full-operations-support"
to = "/full-operations-support.html"

[[services.production.rewrites]]
from = "/karyaa-pro"
to = "/karyaa-pro.html"

[services.env]
PORT = "21325"
BASE_PATH = "/"
