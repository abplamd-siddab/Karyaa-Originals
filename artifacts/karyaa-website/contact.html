<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact — Karyaa</title>
    <meta name="description" content="Get in touch with Karyaa to discuss your staffing needs." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/animations.css" />
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>Contact</h1>
        <p class="tagline">We'd love to hear from you.</p>
        <form id="contact-form" class="contact-form" novalidate>
          <label>Name<input type="text" name="name" required /></label>
          <label>Email<input type="email" name="email" required /></label>
          <label>Message<textarea name="message" rows="4" required></textarea></label>
          <button type="submit">Send</button>
        </form>
      </section>
    </main>
    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/form.js"></script>
  </body>
</html>
